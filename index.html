<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Deployment Success</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 600px;
        }

        .icon {
            font-size: 80px;
            color: #28a745;
        }

        h1 {
            color: #333;
            margin: 20px 0;
        }

        p {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            text-decoration: none;
            background: #007bff;
            color: white;
            border-radius: 30px;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0056b3;
            transform: translateY(-3px);
        }

        .footer {
            margin-top: 25px;
            color: #888;
            font-size: 14px;
        }

        .highlight {
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="icon">🚀</div>

        <h1>Deployment Successful!</h1>

        <p>
            Congratulations! Your website has been deployed
            <span class="highlight">Jenkins CI/CD Pipeline</span>.
        </p>

        <a href="#" class="btn">Explore More</a>

        <div class="footer">
            Deployed by <strong>Prathamesh Dhalkar</strong><br>
            DevOps Engineer | Jenkins • Docker • Kubernetes • AWS
        </div>
    </div>

</body>
</html>
